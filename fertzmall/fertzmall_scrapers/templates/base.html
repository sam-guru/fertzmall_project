{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Fertz Mall</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <!-- Fixed Modern Navbar -->
    <nav class="fixed top-0 z-[100] w-full bg-white/90 backdrop-blur-md border-b border-slate-200 py-3 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8">
            <a href="/" class="flex items-center gap-2 group">
                <img src="{% static 'images/fertzmall-logo.png' %}" class="h-10 w-auto group-hover:scale-105 transition-transform" alt="Fertzmall Logo">
                <span class="text-2xl font-extrabold text-green-800 tracking-tight">Fertz Mall</span>
            </a>
    
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{% url 'login' %}"> 
                    <button type="submit" class="text-sm font-semibold text-red-600 hover:text-red-800 transition">Logout</button>
                </form>
                {% else %}
                    <a href="{% url 'login' %}" class="px-5 py-2 text-sm font-bold text-white bg-green-700 rounded-full hover:bg-green-800 transition shadow-md">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content with Spacer for Fixed Nav -->
    <main id="content" class="flex-grow pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Professional Footer -->
    <footer class="bg-green-900 text-white mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <img src="{% static 'images/fertzmall-logo.png' %}" class="h-8 brightness-0 invert" alt="Fertzmall Logo">
                    <span class="text-xl font-bold">Fertz Mall</span>
                </div>
                <ul class="flex gap-6 text-sm font-medium text-green-100">
                    <li><a href="#" class="hover:text-white transition">About</a></li>
                    <li><a href="#" class="hover:text-white transition">Privacy Policy</a></li>
                    <li><a href="#" class="hover:text-white transition">Contact</a></li>
                </ul>
            </div>
            <div class="border-t border-green-800 mt-8 pt-8 text-center text-xs text-green-200">
                <p>© 2023 Fertz Mall. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- chat widget-->   
    <script src="//www.socialintents.com/api/chat/socialintents.1.3.js#2c9faa358eba9b97018ecf42329c1108" async="async"></script>
</body>
</html>
